spring:
  application:
    name: chat-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Kafka 配置
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:chat-service}
    auto-offset-reset: earliest
  producer:
    acks: all
  topics:
    message-events: ${KAFKA_TOPIC_MESSAGE_EVENTS:message-events}
    presence-events: ${KAFKA_TOPIC_PRESENCE_EVENTS:presence-events}

# MySQL 数据库配置
database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:3306}
  name: ${DB_NAME:chat_db}
  username: ${DB_USERNAME:root}
  password: ${DB_PASSWORD:}

# MongoDB 配置
mongodb:
  host: ${MONGODB_HOST:localhost}
  port: ${MONGODB_PORT:27017}
  database: ${MONGODB_DATABASE:chat_db}
  username: ${MONGODB_USERNAME:}
  password: ${MONGODB_PASSWORD:}

# Gateway 配置
gateway:
  host: ${GATEWAY_HOST:localhost}
  port: ${GATEWAY_PORT:8080}

# 业务动态配置
delivery:
  fanout:
    read-threshold: ${FANOUT_READ_THRESHOLD:100}
    write-threshold: ${FANOUT_WRITE_THRESHOLD:100}
  batch-size: ${DELIVERY_BATCH_SIZE:100}

# HikariCP 连接池配置
spring.datasource.hikari:
  maximum-pool-size: 20
  minimum-idle: 5
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000